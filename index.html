  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --charcoal:    #1E2530;
      --charcoal-mid:#2D3748;
      --charcoal-lt: #3D4A5C;
      --orange:      #E8650A;
      --orange-lt:   #F97316;
      --orange-pale: #FFF4ED;
      --white:       #FFFFFF;
      --off-white:   #F8F9FA;
      --gray-light:  #E9ECF0;
      --gray-mid:    #9AA5B4;
      --gray-dark:   #4A5568;
      --text:        #1A2230;
      --success:     #1A7A4A;
      --success-bg:  #E8F5EE;
      --error:       #C0392B;
      --error-bg:    #FDECEA;
      --radius:      10px;
      --radius-sm:   6px;
      --shadow:      0 4px 24px rgba(30,37,48,0.10);
      --shadow-lg:   0 12px 48px rgba(30,37,48,0.18);
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--off-white); color: var(--text); min-height: 100vh; }

    /* ── NAV ── */
    nav {
      background: var(--charcoal); padding: 0 48px;
      display: flex; align-items: center; justify-content: space-between;
      height: 72px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.25);
    }
    .logo { display: flex; align-items: center; gap: 14px; cursor: pointer; }
    .logo-fp {
      display: flex; align-items: center; gap: 0;
    }
    .logo-fp svg { height: 38px; width: auto; }
    .logo-text { color: var(--white); line-height: 1.1; }
    .logo-text strong { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; }
    .logo-text strong span { color: var(--orange-lt); }
    .logo-text em { font-style: normal; font-size: 10px; color: var(--gray-mid); letter-spacing: 0.12em; text-transform: uppercase; }
    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-links a {
      color: rgba(255,255,255,0.75); font-size: 14px; font-weight: 500;
      padding: 8px 14px; border-radius: 6px; cursor: pointer;
      text-decoration: none; transition: all 0.15s;
    }
    .nav-links a:hover, .nav-links a.active { color: #fff; background: rgba(255,255,255,0.08); }
    .nav-cta {
      background: var(--orange); color: #fff !important;
      padding: 9px 20px !important; border-radius: 6px !important; font-weight: 600 !important;
    }
    .nav-cta:hover { background: var(--orange-lt) !important; }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, var(--charcoal) 0%, var(--charcoal-mid) 60%, #2A3344 100%);
      padding: 100px 48px; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: 0; right: 0;
      width: 55%; height: 100%;
      background: linear-gradient(135deg, transparent, rgba(232,101,10,0.08));
      clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%);
    }
    .hero::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--orange), var(--orange-lt), transparent);
    }
    .hero-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(232,101,10,0.15); border: 1px solid rgba(232,101,10,0.3);
      color: var(--orange-lt); font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 6px 14px; border-radius: 4px; margin-bottom: 28px;
    }
    .hero-eyebrow::before { content: ''; width: 6px; height: 6px; background: var(--orange-lt); border-radius: 50%; }
    .hero h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 68px; font-weight: 800; line-height: 0.95;
      color: #fff; text-transform: uppercase; letter-spacing: 0.01em;
      margin-bottom: 24px;
    }
    .hero h1 span { color: var(--orange-lt); }
    .hero p { font-size: 18px; color: rgba(255,255,255,0.7); max-width: 540px; line-height: 1.7; margin-bottom: 40px; }
    .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; }
    .btn-primary {
      background: var(--orange); color: #fff; border: none;
      padding: 14px 28px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary:hover { background: var(--orange-lt); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,101,10,0.35); }
    .btn-outline {
      background: transparent; color: #fff;
      border: 1.5px solid rgba(255,255,255,0.3);
      padding: 14px 28px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-outline:hover { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.06); }
    .hero-stats {
      display: flex; gap: 40px; margin-top: 60px;
      padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.1);
    }
    .hero-stat { }
    .hero-stat strong { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 800; color: var(--orange-lt); letter-spacing: 0.02em; }
    .hero-stat span { font-size: 13px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── TRUST BAR ── */
    .trust-bar {
      background: var(--white); border-bottom: 1px solid var(--gray-light);
      padding: 20px 48px;
    }
    .trust-bar-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
    }
    .trust-label { font-size: 12px; color: var(--gray-mid); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; white-space: nowrap; }
    .trust-items { display: flex; gap: 24px; flex-wrap: wrap; }
    .trust-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; color: var(--charcoal-mid);
    }
    .trust-item-icon { font-size: 15px; }

    /* ── SECTIONS ── */
    .sec { padding: 80px 48px; }
    .sec-inner { max-width: 1100px; margin: 0 auto; }
    .sec-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--orange); margin-bottom: 12px;
    }
    .sec-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 44px; font-weight: 800; line-height: 1.0;
      color: var(--charcoal); text-transform: uppercase; margin-bottom: 16px;
    }
    .sec-sub { font-size: 16px; color: var(--gray-dark); line-height: 1.7; max-width: 580px; }

    /* ── CARDS ── */
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 48px; }
    .card {
      background: var(--white); border: 1px solid var(--gray-light);
      border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow);
      transition: all 0.2s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: rgba(232,101,10,0.2); }
    .card-icon { font-size: 28px; margin-bottom: 16px; }
    .card h3 { font-size: 18px; font-weight: 700; color: var(--charcoal); margin-bottom: 10px; }
    .card p { font-size: 14px; color: var(--gray-dark); line-height: 1.7; }
    .card-tag {
      display: inline-block; background: var(--orange-pale); color: var(--orange);
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 4px; margin-bottom: 12px;
    }

    /* ── PROCESS ── */
    .process { display: grid; grid-template-columns: repeat(4,1fr); gap: 0; margin-top: 48px; }
    .process-step { padding: 32px 28px; position: relative; }
    .process-step::after {
      content: '→'; position: absolute; right: -12px; top: 32px;
      font-size: 20px; color: var(--orange); font-weight: 700;
    }
    .process-step:last-child::after { display: none; }
    .process-num {
      font-family: 'Barlow Condensed', sans-serif; font-size: 56px; font-weight: 800;
      color: rgba(232,101,10,0.12); line-height: 1; margin-bottom: 8px;
    }
    .process-step h4 { font-size: 15px; font-weight: 700; color: var(--charcoal); margin-bottom: 8px; }
    .process-step p { font-size: 13px; color: var(--gray-dark); line-height: 1.6; }

    /* ── CTA BANNER ── */
    .cta-banner {
      background: linear-gradient(135deg, var(--charcoal) 0%, var(--charcoal-mid) 100%);
      border-radius: var(--radius); padding: 56px 48px;
      display: flex; align-items: center; justify-content: space-between; gap: 32px;
      position: relative; overflow: hidden;
    }
    .cta-banner::before {
      content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 40%;
      background: linear-gradient(135deg, transparent, rgba(232,101,10,0.1));
      clip-path: polygon(20% 0%, 100% 0%, 100% 100%, 0% 100%);
    }
    .cta-banner h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 800; color: #fff; text-transform: uppercase; margin-bottom: 8px; }
    .cta-banner h2 span { color: var(--orange-lt); }
    .cta-banner p { font-size: 15px; color: rgba(255,255,255,0.65); }
    .cta-banner-btns { display: flex; gap: 12px; flex-shrink: 0; position: relative; z-index: 1; }

    /* ── ABOUT ── */
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; margin-top: 48px; }
    .about-img {
      background: linear-gradient(135deg, var(--charcoal), var(--charcoal-mid));
      border-radius: var(--radius); height: 380px;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .about-img::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--orange), var(--orange-lt));
    }
    .about-img-text { color: rgba(255,255,255,0.15); font-family: 'Barlow Condensed', sans-serif; font-size: 100px; font-weight: 800; text-transform: uppercase; }
    .about-values { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 32px; }
    .about-value {
      background: var(--white); border: 1px solid var(--gray-light);
      border-radius: var(--radius-sm); padding: 20px;
      border-left: 3px solid var(--orange);
    }
    .about-value h4 { font-size: 14px; font-weight: 700; color: var(--charcoal); margin-bottom: 4px; }
    .about-value p { font-size: 13px; color: var(--gray-dark); line-height: 1.5; }
    .team-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-top: 48px; }
    .team-card {
      background: var(--white); border: 1px solid var(--gray-light);
      border-radius: var(--radius); overflow: hidden;
    }
    .team-av {
      height: 80px; display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: 0.04em;
    }
    .team-info { padding: 20px; }
    .team-info h4 { font-size: 15px; font-weight: 700; color: var(--charcoal); }
    .team-info .role { font-size: 12px; color: var(--orange); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin: 4px 0 10px; }
    .team-info p { font-size: 13px; color: var(--gray-dark); line-height: 1.6; }

    /* ── SERVICES ── */
    .service-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 48px; }
    .service-card {
      background: var(--white); border: 1px solid var(--gray-light);
      border-radius: var(--radius); padding: 36px;
      box-shadow: var(--shadow); transition: all 0.2s;
    }
    .service-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .service-card.featured { border-color: var(--orange); background: linear-gradient(135deg, #fff9f5, #fff); }
    .service-icon { font-size: 36px; margin-bottom: 16px; }
    .service-card h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; text-transform: uppercase; color: var(--charcoal); margin-bottom: 10px; }
    .service-card > p { font-size: 14px; color: var(--gray-dark); line-height: 1.7; margin-bottom: 20px; }
    .service-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .service-list li { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--charcoal-mid); }
    .service-list li::before { content: ''; width: 6px; height: 6px; background: var(--orange); border-radius: 50%; flex-shrink: 0; }

    /* ── POLICE CHECK FORM ── */
    .form-container { max-width: 820px; margin: 0 auto; }
    .form-steps { display: flex; gap: 0; margin-bottom: 40px; }
    .form-step {
      flex: 1; padding: 16px 20px; text-align: center;
      border-bottom: 3px solid var(--gray-light); position: relative;
      font-size: 13px; font-weight: 600; color: var(--gray-mid); cursor: pointer;
    }
    .form-step.active { color: var(--orange); border-bottom-color: var(--orange); }
    .form-step.done { color: var(--success); border-bottom-color: var(--success); }
    .form-step span { display: block; font-size: 11px; font-weight: 500; margin-top: 2px; opacity: 0.7; }
    .form-card {
      background: var(--white); border: 1px solid var(--gray-light);
      border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow);
    }
    .form-card h3 { font-size: 20px; font-weight: 700; color: var(--charcoal); margin-bottom: 6px; }
    .form-card .sub { font-size: 14px; color: var(--gray-dark); margin-bottom: 28px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--charcoal-mid); margin-bottom: 6px; }
    .form-group label .req { color: var(--orange); margin-left: 2px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--gray-light); border-radius: var(--radius-sm);
      font-size: 14px; font-family: 'Inter', sans-serif; color: var(--text);
      background: var(--white); outline: none; transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(232,101,10,0.1); }
    .form-group textarea { resize: vertical; min-height: 90px; }
    .form-nav { display: flex; justify-content: space-between; margin-top: 28px; }
    .btn-back {
      background: none; border: 1.5px solid var(--gray-light); color: var(--gray-dark);
      padding: 11px 22px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-back:hover { border-color: var(--gray-dark); }
    .upload-zone {
      border: 2px dashed var(--gray-light); border-radius: var(--radius);
      padding: 32px; text-align: center; cursor: pointer;
      transition: all 0.2s; margin-bottom: 16px; background: var(--off-white);
    }
    .upload-zone:hover { border-color: var(--orange); background: var(--orange-pale); }
    .upload-zone.has-file { border-color: var(--success); background: var(--success-bg); }
    .upload-zone-icon { font-size: 28px; margin-bottom: 10px; }
    .upload-zone h4 { font-size: 14px; font-weight: 600; color: var(--charcoal); margin-bottom: 4px; }
    .upload-zone p { font-size: 12px; color: var(--gray-mid); }
    .consent-box {
      background: var(--off-white); border: 1px solid var(--gray-light);
      border-radius: var(--radius-sm); padding: 20px; margin-bottom: 20px;
      font-size: 13px; color: var(--gray-dark); line-height: 1.7; max-height: 200px; overflow-y: auto;
    }
    .checkbox-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; font-size: 14px; color: var(--charcoal-mid); cursor: pointer; }
    .checkbox-row input[type=checkbox] { margin-top: 2px; accent-color: var(--orange); width: 16px; height: 16px; flex-shrink: 0; }
    .success-card {
      text-align: center; background: var(--white); border: 1px solid var(--gray-light);
      border-radius: var(--radius); padding: 60px 40px; box-shadow: var(--shadow);
    }
    .success-icon { font-size: 56px; margin-bottom: 20px; }
    .success-card h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; text-transform: uppercase; color: var(--charcoal); margin-bottom: 12px; }
    .ref-pill {
      display: inline-block; background: var(--orange-pale); border: 1.5px solid rgba(232,101,10,0.3);
      color: var(--orange); font-size: 22px; font-weight: 700; font-family: monospace;
      padding: 12px 28px; border-radius: var(--radius-sm); margin: 16px 0 24px; letter-spacing: 0.05em;
    }

    /* ── TRACK ── */
    .track-card {
      max-width: 640px; margin: 0 auto;
      background: var(--white); border: 1px solid var(--gray-light);
      border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow);
    }
    .track-input-row { display: flex; gap: 12px; margin-bottom: 32px; }
    .track-input-row input {
      flex: 1; padding: 12px 16px; border: 1.5px solid var(--gray-light);
      border-radius: var(--radius-sm); font-size: 15px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.15s;
    }
    .track-input-row input:focus { border-color: var(--orange); }
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .tl-step { display: flex; gap: 16px; padding-bottom: 28px; position: relative; }
    .tl-step:last-child { padding-bottom: 0; }
    .tl-dot-col { display: flex; flex-direction: column; align-items: center; }
    .tl-dot {
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0; z-index: 1;
    }
    .tl-dot.done { background: var(--success); color: #fff; }
    .tl-dot.active { background: var(--orange); color: #fff; box-shadow: 0 0 0 4px rgba(232,101,10,0.15); }
    .tl-dot.pending { background: var(--gray-light); color: var(--gray-mid); }
    .tl-line { width: 2px; flex: 1; background: var(--gray-light); margin-top: 4px; }
    .tl-line.done { background: var(--success); }
    .tl-content { padding-top: 2px; }
    .tl-content h4 { font-size: 14px; font-weight: 700; color: var(--charcoal); margin-bottom: 3px; }
    .tl-content p { font-size: 13px; color: var(--gray-mid); }

    /* ── ADMIN ── */
    .admin-login {
      max-width: 420px; margin: 0 auto;
      background: var(--white); border: 1px solid var(--gray-light);
      border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow);
      text-align: center;
    }
    .admin-login h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; text-transform: uppercase; color: var(--charcoal); margin-bottom: 8px; }
    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 32px; }
    .stat-box {
      background: var(--white); border: 1px solid var(--gray-light);
      border-radius: var(--radius-sm); padding: 20px; text-align: center;
    }
    .stat-box strong { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; color: var(--charcoal); }
    .stat-box span { font-size: 12px; color: var(--gray-mid); text-transform: uppercase; letter-spacing: 0.06em; }
    .admin-table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .admin-table th { background: var(--charcoal); color: rgba(255,255,255,0.8); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 14px 16px; text-align: left; }
    .admin-table td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--gray-light); }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--off-white); }
    .status-pill {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;

  async function loadAdminApps() {
    try {
      const { data } = await db
        .from('forgepoint_police_checks')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(50);
      if (data && data.length > 0) setDbApps(data);
    } catch(e) {}
  }

  async function handlePoliceSubmit() {
    setSubmitting(true);
    setSubmitError('');
    try {

      // Upload files to Supabase Storage (same bucket as PSA: id-documents)
      const uploadFile = async (file, label) => {
        if (!file) return null;
        const ext = file.name.split('.').pop();
        const path = `${refNum}/${label}.${ext}`;
        const r = await fetch(`${SUPA_URL}/storage/v1/object/id-documents/${path}`, {
          method: 'POST',
          headers: {
            'apikey': SUPA_KEY,
            'Authorization': `Bearer ${SUPA_KEY}`,
            'Content-Type': file.type || 'application/octet-stream',
          },
          body: file,
        });
        if (!r.ok) {
          const txt = await r.text();
          throw new Error('Storage upload failed (' + label + '): ' + txt);
        }
        return `${SUPA_URL}/storage/v1/object/id-documents/${path}`;
      };

      // Upload all 5 files — use actual File objects from fileRef
      const selfieFile       = fileRef.current['selfie']?.files[0] || null;
      const licenceFrontFile = fileRef.current['licenceFront']?.files[0] || null;
      const licenceBackFile  = fileRef.current['licenceBack']?.files[0] || null;
      const secFrontFile     = fileRef.current['secondaryFront']?.files[0] || null;
      const secBackFile      = fileRef.current['secondaryBack']?.files[0] || null;

      const [selfieUrl, licenceFrontUrl, licenceBackUrl, secFrontUrl, secBackUrl] = await Promise.all([
        uploadFile(selfieFile,       'selfie-with-licence'),
        uploadFile(licenceFrontFile, 'licence-front'),
        uploadFile(licenceBackFile,  'licence-back'),
        uploadFile(secFrontFile,     'secondary-front'),
        uploadFile(secBackFile,      'secondary-back'),
      ]);

      // Save to Supabase DB
      const { error: dbError } = await db.from('forgepoint_police_checks').insert([{
        ref_number: refNum,
        first_name: form.firstName,
        last_name: form.lastName,
        dob: form.dob,
        gender: form.gender,
        email: form.email,
        phone: form.phone,
        address: form.address,
        suburb: form.suburb,
        state: form.state,
        postcode: form.postcode,
        birth_country: form.birthCountry,
        birth_suburb: form.birthSuburb,
        birth_state: form.birthState,
        check_type: form.checkType,
        work_site: form.workSite,
        id_type: form.idType,
        id_number: form.idNumber,
        secondary_id_type: form.secondaryIdType || null,
        secondary_id_number: form.secondaryIdNumber || null,
        doc_selfie: selfieUrl,
        doc_licence_front: licenceFrontUrl,
        doc_licence_back: licenceBackUrl,
        doc_secondary_front: secFrontUrl,
        doc_secondary_back: secBackUrl,
        status: 'pending',
        company: 'ForgePoint Workforce',
      }]);
      if (dbError) throw new Error('Supabase DB: ' + dbError.message);

      // Send EmailJS notification to Ryan
      const ejsResult = await emailjs.send(EJS_SERVICE_ID, EJS_POLICE_TPL, {
        to_email: 'ryan@forgeworkforceaus.com',
        ref_number: refNum,
        applicant_name: `${form.firstName} ${form.lastName}`,
        applicant_email: form.email,
        applicant_phone: form.phone,
        work_site: form.workSite || 'Not specified',
        check_type: form.checkType,
        submitted_at: new Date().toLocaleString('en-AU', { timeZone: 'Australia/Melbourne' }),
        company: 'ForgePoint Workforce',
      });
      if (ejsResult.status !== 200) throw new Error('EmailJS: status ' + ejsResult.status);

      setSubmitted(true);
    } catch(err) {
      console.error('Submit error:', err);
      setSubmitError('Error: ' + err.message);
    } finally {
      setSubmitting(false);
    }
  }

                      <div className="form-group"><label>First Name <span className="req">*</span></label><input value={form.firstName} onChange={e => up('firstName', e.target.value)} placeholder="John" /></div>
                      <div className="form-group"><label>Last Name <span className="req">*</span></label><input value={form.lastName} onChange={e => up('lastName', e.target.value)} placeholder="Smith" /></div>

                    <div className="form-row">

                    <div className="form-row">

                      <button className="btn-primary" onClick={() => setStep(4)}>Next: Consent →</button>

                {step === 4 && (
                  <div className="form-card">

                    <div className="consent-box">

                      You have the right to access and correct information we hold about you. For privacy queries, contact us at ryan@forgeworkforceaus.com.
                    </div>
                    {[
                      ['consent1', 'I consent to ForgePoint Workforce collecting, using, and disclosing my personal information for the purpose of a National Police Check, as described in the Privacy Notice above.'],
                      ['consent2', 'I declare that all information provided in this application is true and correct. I understand that providing false information is a criminal offence.'],

                      <label key={k} className="checkbox-row">
                        <input type="checkbox" checked={form[k]} onChange={e => up(k, e.target.checked)} />

                    {submitError && (
                      <div style={{ background: 'var(--error-bg)', border: '1px solid rgba(192,57,43,0.2)', borderRadius: 'var(--radius-sm)', padding: 12, fontSize: 13, color: 'var(--error)', marginBottom: 16 }}>

                        {submitting ? 'Submitting…' : 'Submit Application ✓'}

          )}

          {/* TRACK */}
          {tab === 'track' && (
            <div className="track-card">
              <h3 style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 28, fontWeight: 800, textTransform: 'uppercase', color: 'var(--charcoal)', marginBottom: 6 }}>Track Your Application</h3>

                </div>
              )}

                <div>
                  <div style={{ background: 'var(--off-white)', border: '1px solid var(--gray-light)', borderRadius: 'var(--radius-sm)', padding: 16, marginBottom: 24, fontSize: 14 }}>

/* ── APP ── */
const ROUTES = {
  '/':        'home',
  '/home':    'home',
  '/about':   'about',
  '/services':'services',
  '/police':  'police',
  '/apply':   'police',
  '/contact': 'contact',
  '/privacy': 'privacy',
  '/terms':   'terms',
};

const PAGE_PATHS = {
  home:     '/',
  about:    '/about',
  services: '/services',
  police:   '/police',
  contact:  '/contact',
  privacy:  '/privacy',
  terms:    '/terms',
};

function getPageFromPath() {
  const path = window.location.pathname.replace(/\/$/, '') || '/';
  return ROUTES[path] || 'home';
}

function App() {
  const { useState: useStateApp, useEffect } = React;
  const [page, setPage] = React.useState(getPageFromPath);

  React.useEffect(() => {
    const path = PAGE_PATHS[page] || '/';
    if (window.location.pathname !== path) {
      window.history.pushState({ page }, '', path);
    }
    window.scrollTo(0, 0);
  }, [page]);

  React.useEffect(() => {
    const onPop = (e) => {
      setPage(getPageFromPath());
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  const pages = { home: Home, about: About, services: Services, police: Police, contact: Contact, privacy: Privacy, terms: Terms };
  const Page = pages[page] || Home;
  return (
    <>
      <Nav page={page} setPage={setPage} />
      <Page setPage={setPage} />
      <Footer setPage={setPage} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
